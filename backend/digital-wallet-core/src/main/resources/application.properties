spring.application.name=digital-wallet-core
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/digital_wallet_core}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:digital-wallet-core-secret-key-change-in-production}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
app.rate-limit.requests-per-minute=${RATE_LIMIT_REQUESTS_PER_MINUTE:60}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
