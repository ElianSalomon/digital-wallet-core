spring.datasource.url=jdbc:h2:mem:digital_wallet_core_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
app.jwt.secret=digital-wallet-core-test-secret-key
app.jwt.expiration-minutes=60
app.rate-limit.requests-per-minute=1000
